name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install -r requirements-dev.txt

      - name: ruff (style + errors)
        run: ruff check .

      - name: mypy (type checking)
        run: mypy src/app/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: booking_db
          POSTGRES_USER: booking_user
          POSTGRES_PASSWORD: booking_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U booking_user -d booking_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: src
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret-key-long-enough
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: booking_user
          DB_PASSWORD: booking_password
          DB_NAME: booking_db
          REDIS_URL: redis://localhost:6379/0