exclude = [".claude"]

line-length = 100

[lint]
select = ["E", "F", "I", "S", "B", "C4", "UP"]

[lint.per-file-ignores]
"migrations/env.py" = ["E402"]
# Old Flask routes and tests are being replaced — long lines in docstrings/strings are temporary
"src/app/routes/*.py" = ["E501", "B008"]
"tests/*.py" = ["E501", "S101"]
"src/app/utils/*.py" = ["B008"]