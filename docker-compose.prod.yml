# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Uses uvicorn with multiple workers instead of the single-worker dev server.
# DB and Redis ports are not exposed — only the API container needs them.

services:
  api:
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --app-dir src"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
