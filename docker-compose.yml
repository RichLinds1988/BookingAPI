services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_APP: boot.py
      SECRET_KEY: dev-secret-change-me
      JWT_SECRET_KEY: dev-jwt-secret-change-me
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: booking_user
      DB_PASSWORD: booking_password
      DB_NAME: booking_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      # Mount the local migrations folder into the container
      # This ensures migration files are saved to your machine and committed to git
      - ./migrations:/project/migrations
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  test:
    build: .
    command: bash -c "pip install -r requirements-dev.txt && pytest"
    environment:
      FLASK_ENV: testing
      FLASK_APP: boot.py
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: booking_user
      DB_PASSWORD: booking_password
      DB_NAME: booking_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  redis_data: